{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Voting System - Login</title>
    <link rel='stylesheet' href='https://use.fontawesome.com/releases/v5.2.0/css/all.css'>
    <link rel='stylesheet' href='https://use.fontawesome.com/releases/v5.2.0/css/fontawesome.css'>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            height: 100vh;
        }

        .container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            width: 100%;
            padding: 20px;
        }

        .screen {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            position: relative;
            height: 600px;
            width: 360px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            overflow: hidden;
        }

        .screen__content {
            z-index: 1;
            position: relative;
            height: 100%;
        }

        .screen__background {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 0;
            -webkit-clip-path: inset(0 0 0 0);
            clip-path: inset(0 0 0 0);
        }

        .screen__background__shape {
            transform: rotate(45deg);
            position: absolute;
        }

        .screen__background__shape1 {
            height: 520px;
            width: 520px;
            background: rgba(255, 255, 255, 0.15);
            top: -50px;
            right: 120px;
            border-radius: 0 72px 0 0;
            animation: float1 6s ease-in-out infinite;
        }

        .screen__background__shape2 {
            height: 220px;
            width: 220px;
            background: rgba(255, 255, 255, 0.1);
            top: -172px;
            right: 0;
            border-radius: 32px;
            animation: float2 5s ease-in-out infinite;
        }

        .screen__background__shape3 {
            height: 540px;
            width: 190px;
            background: linear-gradient(270deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.05));
            top: -24px;
            right: 0;
            border-radius: 32px;
            animation: float3 7s ease-in-out infinite;
        }

        .screen__background__shape4 {
            height: 400px;
            width: 200px;
            background: rgba(255, 255, 255, 0.08);
            top: 420px;
            right: 50px;
            border-radius: 60px;
            animation: float4 8s ease-in-out infinite;
        }

        @keyframes float1 {
            0%, 100% { transform: translateY(0) rotate(45deg); }
            50% { transform: translateY(-20px) rotate(45deg); }
        }

        @keyframes float2 {
            0%, 100% { transform: translateY(0) rotate(45deg); }
            50% { transform: translateY(-30px) rotate(45deg); }
        }

        @keyframes float3 {
            0%, 100% { transform: translateX(0) rotate(45deg); }
            50% { transform: translateX(-15px) rotate(45deg); }
        }

        @keyframes float4 {
            0%, 100% { transform: translateY(0) rotate(45deg); }
            50% { transform: translateY(-25px) rotate(45deg); }
        }

        /* Login Form */
        .login {
            width: 320px;
            padding: 60px 30px 30px;
        }

        .login__header {
            text-align: center;
            margin-bottom: 40px;
        }

        .login__icon-main {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .login__icon-main i {
            font-size: 2.5rem;
            color: #fff;
        }

        .login__title {
            color: #fff;
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        .login__subtitle {
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.95rem;
            font-weight: 400;
        }

        .login__field {
            padding: 20px 0;
            position: relative;
        }

        .login__icon {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.7);
            left: 15px;
            font-size: 1.2rem;
            transition: all 0.3s ease;
        }

        .login__input {
            border: none;
            border-bottom: 2px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.1);
            padding: 15px 15px 15px 50px;
            font-weight: 500;
            width: 100%;
            transition: all 0.3s ease;
            color: #fff;
            font-size: 1rem;
            font-family: 'Poppins', sans-serif;
            border-radius: 10px;
        }

        .login__input:active,
        .login__input:focus,
        .login__input:hover {
            outline: none;
            background: rgba(255, 255, 255, 0.15);
            border-bottom-color: rgba(255, 255, 255, 0.8);
        }

        .login__input:focus + .login__icon {
            color: #fff;
        }

        .login__input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        .button {
            background: #fff;
            font-size: 1rem;
            margin-top: 30px;
            padding: 16px 20px;
            border-radius: 26px;
            border: none;
            font-weight: 700;
            display: flex;
            align-items: center;
            width: 100%;
            color: #667eea;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .button:hover {
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.3);
            transform: translateY(-3px);
        }

        .button:active {
            transform: translateY(-1px);
        }

        .button__text {
            flex-grow: 1;
            text-align: center;
        }

        .button__icon {
            font-size: 1.5rem;
            margin-left: auto;
        }

        .social-login {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            text-align: center;
        }

        .social-login h3 {
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .social-icons {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .social-login__icon {
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            color: #fff;
            font-size: 1.2rem;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .social-login__icon:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-5px) scale(1.1);
        }

        .social-login__icon.fab.fa-instagram:hover {
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
        }

        .social-login__icon.fab.fa-facebook:hover {
            background: #3b5998;
        }

        .social-login__icon.fab.fa-twitter:hover {
            background: #1da1f2;
        }

        /* Responsive */
        @media (max-width: 400px) {
            .screen {
                width: 100%;
                height: 550px;
            }

            .login {
                width: 100%;
                padding: 40px 20px 20px;
            }

            .login__title {
                font-size: 1.5rem;
            }

            .login__icon-main {
                width: 70px;
                height: 70px;
            }

            .login__icon-main i {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="screen">
            <div class="screen__content">
                <!-- Login Header -->
                <div class="login__header">
                    <div class="login__icon-main">
                        <i class="fas fa-vote-yea"></i>
                    </div>
                    <h2 class="login__title">E-Voting</h2>
                    <p class="login__subtitle">Secure Login</p>
                </div>

                <form class="login" action="loginverify" method="post">
                    <div class="login__field">
                        <i class="login__icon fas fa-user"></i>
                        <input type="text" class="login__input" name="textfield" placeholder="Username" required>
                    </div>
                    <div class="login__field">
                        <i class="login__icon fas fa-lock"></i>
                        <input type="password" class="login__input" name="textfield2" placeholder="Password" required>
                    </div>
                    <button class="button login__submit">
                        <span class="button__text">Log In Now</span>
                        <i class="button__icon fas fa-chevron-right"></i>
                    </button>
                </form>

                <div class="social-login">
                    <h3>Or login via</h3>
                    <div class="social-icons">
                        <a href="#" class="social-login__icon fab fa-instagram"></a>
                        <a href="#" class="social-login__icon fab fa-facebook"></a>
                        <a href="#" class="social-login__icon fab fa-twitter"></a>
                    </div>
                </div>
            </div>

            <div class="screen__background">
                <span class="screen__background__shape screen__background__shape4"></span>
                <span class="screen__background__shape screen__background__shape3"></span>
                <span class="screen__background__shape screen__background__shape2"></span>
                <span class="screen__background__shape screen__background__shape1"></span>
            </div>
        </div>
    </div>
</body>
</html>

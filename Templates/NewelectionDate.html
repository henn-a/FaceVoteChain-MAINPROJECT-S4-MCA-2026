{% extends 'admin/adminindex.html' %}
{% block body %}
<body>
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-lg-7 col-md-9">
      <div class="card shadow">
        <div class="card-header bg-primary text-white">
          <h4 class="mb-0"><i class="fas fa-calendar-plus"></i> Add New Election Date</h4>
        </div>
        <div class="card-body p-4">
          <form id="form1" name="form1" method="post" action="/newelectiondate">

            <!-- Post Field -->
            <div class="mb-3">
              <label for="post" class="form-label fw-bold">
                <i class="fas fa-briefcase text-primary"></i> Post <span class="text-danger">*</span>
              </label>
              <input type="text" class="form-control" id="post"
                     name="textfield" placeholder="e.g., Student President" required />
            </div>

            <!-- Date Field -->
            <div class="mb-3">
              <label for="date" class="form-label fw-bold">
                <i class="fas fa-calendar-day text-primary"></i> Date <span class="text-danger">*</span>
              </label>
              <input type="date" class="form-control" id="date"
                     name="textfield2" required />
            </div>

            <!-- Details Field -->
            <div class="mb-3">
              <label for="details" class="form-label fw-bold">
                <i class="fas fa-info-circle text-primary"></i> Details <span class="text-danger">*</span>
              </label>
              <textarea class="form-control" id="details"
                        name="textfield3" rows="3" placeholder="Enter election details..." required></textarea>
            </div>

            <!-- Election Date Field -->
            <div class="mb-4">
              <label for="electiondate" class="form-label fw-bold">
                <i class="fas fa-vote-yea text-primary"></i> Election Date <span class="text-danger">*</span>
              </label>
              <input type="date" class="form-control" id="electiondate"
                     name="textfield4" required />
            </div>

            <!-- Submit Button -->
            <div class="text-center">
              <button type="submit" name="Submit" class="btn btn-primary btn-lg px-5">
                <i class="fas fa-check-circle"></i> Submit
              </button>
            </div>

          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<style>
  body {
    background-color: #f4f6f9;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    padding: 2rem 0;
  }

  .card {
    border-radius: 12px;
    border: none;
  }

  .card-header {
    border-radius: 12px 12px 0 0 !important;
    padding: 1.25rem;
  }

  .card-header h4 {
    font-weight: 600;
  }

  .form-label {
    color: #2c3e50;
    margin-bottom: 0.5rem;
  }

  .form-control {
    border: 1px solid #dce4ec;
    border-radius: 6px;
    padding: 0.65rem 0.85rem;
    transition: all 0.3s ease;
  }

  .form-control:focus {
    border-color: #0d6efd;
    box-shadow: 0 0 0 0.2rem rgba(13, 110, 253, 0.15);
  }

  textarea.form-control {
    resize: vertical;
  }

  .btn-primary {
    padding: 0.65rem 2.5rem;
    font-weight: 600;
    border-radius: 6px;
    transition: all 0.3s ease;
  }

  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(13, 110, 253, 0.4);
  }

  .text-danger {
    font-weight: bold;
  }

  i.fas {
    margin-right: 0.35rem;
  }
</style>

<!-- Font Awesome for icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

</body>
{% endblock %}

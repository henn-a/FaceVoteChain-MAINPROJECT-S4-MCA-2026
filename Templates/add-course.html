{% extends 'admin/adminindex.html' %}
{% block body %}

<style>
  .course-form-container {
    max-width: 650px;
    margin: 50px auto;
    padding: 20px;
  }

  .form-header {
    background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
    color: white;
    padding: 35px;
    border-radius: 15px 15px 0 0;
    text-align: center;
    box-shadow: 0 4px 20px rgba(240, 147, 251, 0.4);
  }

  .form-header h2 {
    margin: 0;
    font-weight: 700;
    font-size: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 15px;
  }

  .form-header p {
    margin: 12px 0 0 0;
    opacity: 0.95;
    font-size: 15px;
    font-weight: 400;
  }

  .form-card {
    background: white;
    border-radius: 0 0 15px 15px;
    box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
    padding: 50px 45px;
  }

  .form-group {
    margin-bottom: 30px;
  }

  .form-label {
    display: block;
    font-weight: 700;
    color: #2c3e50;
    margin-bottom: 12px;
    font-size: 15px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .label-icon {
    display: inline-block;
    width: 28px;
    text-align: center;
    margin-right: 8px;
    font-size: 18px;
  }

  .required {
    color: #f5576c;
    margin-left: 3px;
    font-size: 16px;
  }

  .form-input {
    width: 100%;
    padding: 15px 20px;
    border: 2px solid #e0e0e0;
    border-radius: 10px;
    font-size: 16px;
    transition: all 0.3s ease;
    font-family: inherit;
    background: #fafafa;
    box-sizing: border-box;
  }

  .form-input:focus {
    outline: none;
    border-color: #f093fb;
    box-shadow: 0 0 0 4px rgba(240, 147, 251, 0.15);
    background: white;
  }

  .form-input:hover {
    border-color: #f093fb;
    background: white;
  }

  .form-input::placeholder {
    color: #adb5bd;
    font-style: italic;
  }

  /* Textarea Styling */
  .form-textarea {
    width: 100%;
    padding: 15px 20px;
    border: 2px solid #e0e0e0;
    border-radius: 10px;
    font-size: 16px;
    transition: all 0.3s ease;
    font-family: inherit;
    background: #fafafa;
    resize: vertical;
    min-height: 120px;
    box-sizing: border-box;
  }

  .form-textarea:focus {
    outline: none;
    border-color: #f093fb;
    box-shadow: 0 0 0 4px rgba(240, 147, 251, 0.15);
    background: white;
  }

  .form-textarea:hover {
    border-color: #f093fb;
    background: white;
  }

  .form-textarea::placeholder {
    color: #adb5bd;
    font-style: italic;
  }

  /* Character Counter */
  .char-counter {
    text-align: right;
    font-size: 12px;
    color: #6c757d;
    margin-top: 5px;
    font-weight: 500;
  }

  /* Submit Button */
  .submit-section {
    margin-top: 40px;
    padding-top: 30px;
    border-top: 2px solid #f5f5f5;
    text-align: center;
  }

  .btn-submit {
    padding: 16px 70px;
    background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
    color: white;
    border: none;
    border-radius: 30px;
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.4s ease;
    box-shadow: 0 5px 20px rgba(240, 147, 251, 0.4);
    text-transform: uppercase;
    letter-spacing: 1.5px;
  }

  .btn-submit:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 30px rgba(240, 147, 251, 0.6);
  }

  .btn-submit:active {
    transform: translateY(-2px);
  }

  /* Icon decoration */
  .input-decoration {
    position: relative;
  }

  .input-icon {
    position: absolute;
    right: 20px;
    top: 50%;
    transform: translateY(-50%);
    color: #adb5bd;
    font-size: 20px;
    pointer-events: none;
  }

  /* Helper Text */
  .helper-text {
    font-size: 13px;
    color: #6c757d;
    margin-top: 8px;
    font-style: italic;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  /* Responsive Design */
  @media (max-width: 768px) {
    .course-form-container {
      margin: 20px auto;
      padding: 15px;
    }

    .form-card {
      padding: 35px 25px;
    }

    .form-header {
      padding: 25px 20px;
    }

    .form-header h2 {
      font-size: 26px;
    }

    .btn-submit {
      width: 100%;
      padding: 16px 30px;
    }
  }

  /* Validation Styles */
  .form-input:valid,
  .form-textarea:valid {
    border-color: #28a745;
  }

  .form-input:invalid:not(:placeholder-shown),
  .form-textarea:invalid:not(:placeholder-shown) {
    border-color: #dc3545;
  }
</style>

<div class="course-form-container">
  <div class="form-header">
    <h2>
      <span>📚</span>
      <span>Add New Course</span>
    </h2>
    <p>Create a new course by filling in the details below</p>
  </div>

  <div class="form-card">
    <form id="form1" name="form1" method="post" action="addnewcourse">

      <!-- Course Name -->
      <div class="form-group">
        <label class="form-label">
          <span class="label-icon">📖</span>
          Course Name<span class="required">*</span>
        </label>
        <input
          type="text"
          name="textfield"
          class="form-input"
          placeholder="e.g., Advanced Mathematics, Introduction to Python"
          maxlength="100"
          required
        />
        <div class="helper-text">
          <span>💡</span>
          <span>Enter a clear and descriptive course name</span>
        </div>
      </div>

      <!-- Description -->
      <div class="form-group">
        <label class="form-label">
          <span class="label-icon">📝</span>
          Course Description<span class="required">*</span>
        </label>
        <textarea
          name="textfield2"
          class="form-textarea"
          placeholder="Provide a detailed description of the course content, objectives, and learning outcomes..."
          maxlength="500"
          id="description"
          required
          oninput="updateCharCount()"
        ></textarea>
        <div class="char-counter">
          <span id="charCount">0</span> / 500 characters
        </div>
        <div class="helper-text">
          <span>💡</span>
          <span>Describe what students will learn in this course</span>
        </div>
      </div>

      <!-- Submit Button -->
      <div class="submit-section">
        <button type="submit" name="Submit" class="btn-submit">
          💾 Save Course
        </button>
      </div>

    </form>
  </div>
</div>

<script>
  function updateCharCount() {
    const textarea = document.getElementById('description');
    const charCount = document.getElementById('charCount');
    charCount.textContent = textarea.value.length;

    // Change color based on character count
    if (textarea.value.length > 450) {
      charCount.style.color = '#dc3545';
    } else if (textarea.value.length > 350) {
      charCount.style.color = '#ffc107';
    } else {
      charCount.style.color = '#6c757d';
    }
  }
</script>

{% endblock %}
